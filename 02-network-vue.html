<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02 Vue 資料產生路網圖</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      color: #1f2937;
      background: #f4f7fb;
    }
    .page {
      width: min(960px, calc(100% - 32px));
      margin: 32px auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
    }
    .tag {
      padding: 6px 10px;
      border: 1px solid #2563eb;
      color: #1d4ed8;
      background: #eff6ff;
      font-size: 14px;
    }
    .network {
      width: 768px;
      max-width: 100%;
      margin: 0 auto;
      padding-top: 92px;
      display: grid;
      grid-template-columns: repeat(var(--per-row), 1fr);
      border: 2px solid #1f2937;
      background: #fff;
      --line-color: #2563eb;
    }
    .station {
      position: relative;
      min-height: 150px;
      padding: 0 10px;
      text-align: center;
    }
    .station::before,
    .station::after {
      content: "";
      position: absolute;
      top: 0;
      width: 50%;
      height: 8px;
      background: var(--line-color);
    }
    .station::before { left: 0; }
    .station::after { right: 0; }
    .station.route-start::before,
    .station.route-end-left::before,
    .station.route-end-right::after {
      display: none;
    }
    .station.turn-right {
      border-right: 8px solid var(--line-color);
    }
    .station.turn-left {
      border-left: 8px solid var(--line-color);
    }
    .station-status {
      position: absolute;
      left: 0;
      right: 0;
      top: -78px;
      min-height: 42px;
      font-size: 14px;
      line-height: 1.5;
      color: #374151;
      z-index: 2;
    }
    .station-dot {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translate(-50%, -50%);
      z-index: 2;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #2563eb;
      border: 5px solid #dbeafe;
    }
    .station-name {
      position: absolute;
      left: 0;
      right: 0;
      top: 34px;
      font-weight: 700;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="app">
    <main class="page">
      <div class="topbar">
        <h1>{{ routeName }} 路網圖</h1>
        <div class="tag">每列 {{ perRow }} 站</div>
      </div>

      <!-- :style：讓每列站點數由 perRow 決定，CSS Grid 會依照它切欄。 -->
      <section class="network" :style="{ '--per-row': perRow }">
        <!-- v-for：displayStations 已經把偶數列反轉，讓 Grid 看起來是蛇行路線。 -->
        <div class="station" v-for="item in displayStations" :key="item.station.id" :class="item.classList">
          <div class="station-status">
            <!-- v-if：根據後端資料中的 status 決定目前這站要顯示哪種狀態。 -->
            <template v-if="item.station.status === 'not_started'">
              未發車
            </template>

            <template v-else-if="item.station.status === 'running'">
              {{ item.station.plate }}<br>
              約 {{ item.station.minutes }} 分鐘
            </template>

            <template v-else-if="item.station.status === 'arrived'">
              {{ item.station.plate }}<br>
              已到站
            </template>
          </div>

          <div class="station-dot"></div>
          <div class="station-name">{{ item.station.name }}</div>
        </div>
      </section>
    </main>
  </div>

  <script src="./vue.3.5.13.js"></script>
  <script>
    const { createApp, computed, ref } = Vue

    createApp({
      setup() {
        // routeName 是路線名稱，給標題顯示。
        const routeName = ref('板南線')

        // perRow 控制 CSS Grid 一列顯示幾個站點。
        const perRow = ref(3)

        // stations 是給 v-for 使用的陣列；每一筆代表路網圖中的一站。
        const stations = ref([
          { id: 1, name: '台北車站', status: 'arrived', plate: 'C12345', minutes: 0 },
          { id: 2, name: '西門', status: 'arrived', plate: 'C12345', minutes: 0 },
          { id: 3, name: '龍山寺', status: 'running', plate: 'C12345', minutes: 2 },
          { id: 4, name: '江子翠', status: 'not_started', plate: '', minutes: null },
          { id: 5, name: '新埔', status: 'not_started', plate: '', minutes: null },
          { id: 6, name: '板橋', status: 'not_started', plate: '', minutes: null }
        ])

        // displayStations 會把資料轉成 Grid 顯示順序；奇數列反轉，畫面會像路線圖一樣蛇行。
        const displayStations = computed(function() {
          const items = []
          const total = stations.value.length
          const rowCount = Math.ceil(total / perRow.value)

          for (let rowIndex = 0; rowIndex < rowCount; rowIndex++) {
            const start = rowIndex * perRow.value
            const row = stations.value.slice(start, start + perRow.value)
            const isReverse = rowIndex % 2 === 1
            const showRow = isReverse ? row.slice().reverse() : row

            showRow.forEach(function(station) {
              const routeIndex = stations.value.indexOf(station)
              const classList = []

              if (routeIndex === 0) {
                classList.push('route-start')
              }

              if (routeIndex === total - 1) {
                classList.push(isReverse ? 'route-end-left' : 'route-end-right')
              }

              if (rowIndex < rowCount - 1) {
                const isRouteRowEnd = isReverse
                  ? routeIndex === start + row.length - 1
                  : routeIndex === start + row.length - 1

                if (isRouteRowEnd) {
                  classList.push(isReverse ? 'turn-left' : 'turn-right')
                }
              }

              items.push({
                station: station,
                classList: classList
              })
            })
          }

          return items
        })

        return {
          routeName,
          perRow,
          stations,
          displayStations
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
